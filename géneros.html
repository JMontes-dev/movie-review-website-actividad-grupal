<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Ejercicios_L_Marcas/movie-review-website-actividad-grupal/css/estilo.css">
    <title>Géneros</title>

</head>

<body>

    <header>
        <div class="divLogo">
            <img id="logo" src="/Ejercicios_L_Marcas/movie-review-website-actividad-grupal/imágenes/Logo.png">
        </div>

        <nav class="menu">
            <ul class="menu-list">
                <li><a href="/Ejercicios_L_Marcas/movie-review-website-actividad-grupal/index.html">Inicio</a></li>
                <li><a href="/Ejercicios_L_Marcas/movie-review-website-actividad-grupal/géneros.html">Géneros</a></li>
                <li><a href="/Ejercicios_L_Marcas/movie-review-website-actividad-grupal/contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>


    <main>

        <section class="hero">      
            <div class="hero-content">
                <h1>Géneros de Películas</h1>
                <p>Encuentra la reseña de tu película buscándola por su Género</p>
            </div>
        </section>

        <section id="filtro">
            <input type="radio" id="todos" name="genero" checked>
            <label for="all">Todos</label>

            <input type="radio" id="accion" name="genero">
            <label for="accion">Acción</label>

            <input type="radio" id="comedia" name="genero">
            <label for="comedia">Comedia</label>

            <input type="radio" id="drama" name="genero">
            <label for="drama">Drama</label>

            <div class="movies">
                <div class="movie accion">
                    <h3>Película Acción 1</h3>
                    <p>Reseña de acción 1...</p>
                </div>

                <div class="movie comedia">
                    <h3>Película Comedia 1</h3>
                    <p>Reseña de comedia 1...</p>
                </div>

                <div class="movie drama">
                    <h3>Película Drama 1</h3>
                    <p>Reseña de drama 1...</p>
                </div>

                <div class="movie accion">
                    <h3>Película Acción 2</h3>
                    <p>Reseña de acción 2...</p>
                </div>
            </div>
        </section>

    </main>

    
    



</body>
</html>
